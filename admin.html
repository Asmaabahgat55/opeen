<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الأكاديمية | الطلبات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; align-items: flex-start; padding-top: 50px; }
        .admin-panel { width: 95%; max-width: 1100px; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin: auto; }
        h1 { color: #0f4a81; border-bottom: 2px solid #0f4a81; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th { background: #0f4a81; color: white; padding: 15px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #ddd; color: #333; }
        .tag { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }
        .tag-st { background: #dcfce7; color: #166534; }
        .tag-tr { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>لوحة تحكم الأدمن - طلبات الأكاديمية</h1>
        <table>
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>الدور</th>
                    <th>المادة</th>
                    <th>المرحلة</th>
                    <th>التواصل</th>
                    <th>المحافظة/المنطقة</th>
                    <th>السعر/النظام</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                </tbody>
        </table>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:red; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">مسح كافة البيانات</button>
    </div>
    <script>
        // كود لعرض البيانات المخزنة في الـ LocalStorage
        const data = JSON.parse(localStorage.getItem('academyRequests') || '[]');
        const tableBody = document.getElementById('dataTable');

        data.forEach(item => {
            const row = `<tr>
                <td>${item.name}</td>
                <td><span class="tag ${item.role === 'student' ? 'tag-st' : 'tag-tr'}">${item.role === 'student' ? 'طالب' : 'معلم'}</span></td>
                <td>${item.subject}</td>
                <td>${item.stage}</td>
                <td>${item.phone}</td>
                <td>${item.city || 'أونلاين'} - ${item.area || ''}</td>
                <td>${item.price || item.mode}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    </script>
</body>
</html>
